name: biobb_vs
channels:
  - conda-forge
  - bioconda
  - salilab
dependencies:
  - python=3.11            # vina (pulled by biobb_vs) has no py3.12 build -> 3.12 won't solve
  - pip
  - biobb_common>=5.2.2
  - biobb_structure_utils>=5.2.1
  - biobb_gromacs>=5.2.0
  - biobb_analysis>=5.2.1
  - biobb_io>=5.2.3
  - biobb_vs>=5.2.1
  - biobb_chemistry>=5.2.1
  - mdanalysis
  - openbabel==3.1.1
  - biopython
  - pip:
    - .                          # install biobb_vs_workflows itself
